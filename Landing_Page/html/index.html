<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Landing_Page/css/styles.css" />
    <title>Website Landing page html & css</title>
</head>
<body>
    <header class="navbar"> <!-- used to define the introductory content of a document or a section -->
        <!-- ID = single element and Class = Multiply elements  -->
         <!-- The id and class attributes in HTML are used for element identification and styling. The id attribute uniquely identifies a single element, while the class attribute can be applied to multiple elements -->
        <h1 class="logo">Webrand</h1>
        <nav>
        <ul> <!-- unordered list - it´s used to create lists where the order of items doesn´t matter, such as bullet-point lists. Each item in the list is denoted by the <li> (list item) tag.-->
        <li><a href="#">About</a></li>          
        <li><a href="#">Services</a></li>          
        <li><a href="#">Contact</a></li>               
        </ul>
        </nav>
    </header>
    <section class="hero"> <!-- The <section> HTML element represents a generic standalone section of a document, which doesn't have a more specific semantic element to represent it.
        
        or a structural HTML element used to group together related elements. Each <section> typically includes one or more heading elements and additional elements presenting related content.--> 
            <!-- Example: -->
            <h1>Welcome to BranDev</h1>
            <p>Your journey will become to turn very awesome</p>
            <button class="button">Click here</button>
    </section>
</body>
</html>
