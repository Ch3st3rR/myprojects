<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/tryingsohard/css/styles.css" />

    <script src="/tryingsohard/js/scripts.js" defer></script>
    <title>Trying here</title>
  </head>
  <body>
    <div class="biography">
      <header>
        <h1>Welcome to my first website</h1>
        <h2>This website is just for testing my knowledge...</h2>
        <p></p>
        <!-- 👉 Regra:
        h1 = só 1 por página
        h2/h3 = subtítulos
        p = texto normal -->
      </header>
    </div>
    <form id="forms">
      <!-- Agrupa campos de entrada
Serve pra enviar dados (ex: nome, email)

👉 Tudo que o usuário digita deve estar dentro dele -->
      <h2>Before I comment more details, please fill my forms</h2>
      <label for="fname">First name:</label><br />
      <input type="text" id="f-name" name="fname" /><br />
      <!-- Campo onde o usuário digita
type="text" → tipo de dado
id → identificador (usado no CSS/JS)
name → nome enviado no formulário -->
      <label for="lname">Last name:</label><br />
      <input type="text" id="lname" name="lname" />
      <button>Send here</button>
      <!-- Botão que envia o formulário
type="submit" → faz o envio -->
    </form>
  </body>
</html>
